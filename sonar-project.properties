sonar.projectKey=paavana-410_campus_complaint
sonar.organization=paavana-410

sonar.projectName=Campus Complaint System
sonar.projectVersion=1.0

# ── Source files to scan ──────────────────────────────────────
sonar.sources=client/src,server

# ── Broad exclusions (reduces noise from generated/3rd-party code) ─
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.min.js,**/*.test.js,**/*.spec.js,**/__tests__/**,**/jest.config.*,**/setupTests.*,**/reportWebVitals.*,**/serviceWorker.*,client/src/App.test.js,k8s/secret.yaml

# ── Test file declarations ─────────────────────────────────────
sonar.tests=client/src,server/tests
sonar.test.inclusions=**/*.test.js,**/*.spec.js,**/__tests__/**

# ── Coverage reports ──────────────────────────────────────────
sonar.javascript.lcov.reportPaths=client/coverage/lcov.info,server/coverage/lcov.info

# ── Encoding ──────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── Quality Gate behaviour ────────────────────────────────────
# Do NOT wait for the quality gate result inside the pipeline.
# Issues are still visible on SonarCloud dashboard but won't block CI.
sonar.qualitygate.wait=false
