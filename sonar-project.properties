sonar.projectKey=campus-complaint-system
sonar.organization=your-github-org
# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=Campus Complaint System
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=client/src,server
sonar.exclusions=**/node_modules/**,**/*.spec.js,**/*.test.js,**/__tests__/**

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Test files and coverage
sonar.tests=client/src,server/tests
sonar.test.inclusions=**/*.test.js,**/*.spec.js
sonar.javascript.lcov.reportPaths=client/coverage/lcov.info,server/coverage/lcov.info
