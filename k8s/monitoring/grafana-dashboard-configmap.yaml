apiVersion: v1
kind: ConfigMap
metadata:
  name: campus-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  campus-app.json: |
    {
      "id": null,
      "uid": "campus-app",
      "title": "Campus Complaint System",
      "tags": ["campus", "nodejs", "express"],
      "timezone": "browser",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "15s",
      "panels": [
        {
          "id": 1,
          "title": "Total HTTP Requests (Last 5m)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(increase(http_requests_total[5m]))",
              "legendFormat": "Requests",
              "refId": "A"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 100 },
                  { "color": "red", "value": 500 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 2,
          "title": "HTTP Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total[1m])) by (method, route)",
              "legendFormat": "{{method}} {{route}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 20
              }
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "title": "HTTP Response Time (p95)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, route))",
              "legendFormat": "p95 {{route}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "s",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10
              }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "title": "HTTP Errors (5xx Rate)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{status_code=~'5..'}[5m]))",
              "legendFormat": "5xx/s",
              "refId": "A"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            }
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.01 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 5,
          "title": "Node.js Heap Memory Used",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "nodejs_heap_size_used_bytes",
              "legendFormat": "Heap Used",
              "refId": "A"
            },
            {
              "expr": "nodejs_heap_size_total_bytes",
              "legendFormat": "Heap Total",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 15
              }
            },
            "overrides": []
          }
        },
        {
          "id": 6,
          "title": "Active Handles & Event Loop",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [
            {
              "expr": "nodejs_active_handles_total",
              "legendFormat": "Active Handles",
              "refId": "A"
            },
            {
              "expr": "nodejs_eventloop_lag_seconds",
              "legendFormat": "Event Loop Lag (s)",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10
              }
            },
            "overrides": []
          }
        }
      ]
    }
