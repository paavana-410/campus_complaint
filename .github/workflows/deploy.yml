name: CD – Build & Publish Docker Images

# ─────────────────────────────────────────────────────────────
#  Triggered ONLY after ci.yml (CI pipeline) passes on main.
#  Minikube is LOCAL – GitHub runners cannot SSH into it, so
#  this workflow handles everything that CAN run in the cloud:
#    1. Build production Docker images
#    2. Tag them with both :latest and :<git-sha>
#    3. Push to Docker Hub
#  Then a local script (cd-deploy.ps1) handles the Minikube
#  rolling update by pulling the new images.
# ─────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["Campus Complaint CI Pipeline"]   # must match name: in ci.yml
    types:
      - completed
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────────────────
  # Only proceed if the CI pipeline actually succeeded
  # ──────────────────────────────────────────────────────────
  check-ci:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Check CI result
        id: check
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" == "success" ]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "✅ CI passed – proceeding with CD"
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "❌ CI failed – skipping CD"
          fi

  # ──────────────────────────────────────────────────────────
  # Build and publish versioned Docker images to Docker Hub
  # ──────────────────────────────────────────────────────────
  build-and-publish:
    runs-on: ubuntu-latest
    needs: check-ci
    if: needs.check-ci.outputs.should_deploy == 'true'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Server image ──────────────────────────────────────
      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/campus-server:latest
            ${{ secrets.DOCKER_USERNAME }}/campus-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Client image ──────────────────────────────────────
      - name: Build and Push Client Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/campus-client:latest
            ${{ secrets.DOCKER_USERNAME }}/campus-client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Summary ───────────────────────────────────────────
      - name: Print deployment summary
        run: |
          echo "## ✅ Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| campus-server | \`latest\`, \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| campus-client | \`latest\`, \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**To deploy to Minikube locally, run:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`powershell" >> $GITHUB_STEP_SUMMARY
          echo ".\\cd-deploy.ps1" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
