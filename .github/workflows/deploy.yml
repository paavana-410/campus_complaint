name: CD – Build, Stage & Publish

# ─────────────────────────────────────────────────────────────
#  Triggered ONLY after the CI pipeline passes on main.
#  Flow:
#    1. Build Docker images (versioned with git SHA)
#    2. Push to Docker Hub
#    3. (Optional) Notify that staging is ready to deploy
# ─────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["Campus Complaint CI Pipeline"]
    types:
      - completed
    branches:
      - main

jobs:
  # ── Guard: only run if CI passed ──────────────────────────
  check-ci:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Check CI result
        id: check
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" == "success" ]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "✅ CI passed – proceeding with CD"
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "❌ CI failed – skipping CD"
          fi

  # ── Build and publish versioned images to Docker Hub ──────
  build-and-publish:
    runs-on: ubuntu-latest
    needs: check-ci
    if: needs.check-ci.outputs.should_deploy == 'true'
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: set-tag
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "image_tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Image tag: $SHORT_SHA"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/campus-server:latest
            ${{ secrets.DOCKER_USERNAME }}/campus-server:${{ steps.set-tag.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Client Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/campus-client:latest
            ${{ secrets.DOCKER_USERNAME }}/campus-client:${{ steps.set-tag.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print publish summary
        run: |
          echo "## ✅ Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| campus-server | \`latest\`, \`${{ steps.set-tag.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| campus-client | \`latest\`, \`${{ steps.set-tag.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY

  # ── Staging notification (Minikube is local) ──────────────
  staging-ready:
    runs-on: ubuntu-latest
    needs: build-and-publish
    steps:
      - name: Staging deployment instructions
        run: |
          echo "## 🚦 Staging Ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Images are published. Deploy to **staging** namespace on Minikube:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`powershell" >> $GITHUB_STEP_SUMMARY
          echo "# Deploy to staging (test here first)" >> $GITHUB_STEP_SUMMARY
          echo ".\\cd-deploy.ps1 -Namespace staging" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# After verifying staging, promote to production" >> $GITHUB_STEP_SUMMARY
          echo ".\\cd-deploy.ps1 -Namespace production" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image tag deployed:** \`${{ needs.build-and-publish.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
