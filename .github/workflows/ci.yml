name: Campus Complaint CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Verify Backend Server Build
        run: docker build -t campus-server:test ./server

      - name: Verify Frontend Client Build
        run: docker build -t campus-client:test ./client

      # In a full Production setup, the next steps would be:
      # 1. Log in to Docker Hub: docker login -u ${{ secrets.DOCKER_USER }} -p ${{ secrets.DOCKER_PASS }}
      # 2. Push images: docker push campus-server:latest
      # 3. Connect to your Cloud Kubernetes and run kubectl apply -f ./k8s/
