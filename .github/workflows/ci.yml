name: Campus Complaint CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # SonarCloud needs full history

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '18'

      - name: Install dependencies and Run Server Tests
        run: |
          cd server
          npm install --legacy-peer-deps
          npm run test:coverage

      - name: Install dependencies and Run Client Tests
        run: |
          cd client
          npm install --legacy-peer-deps
          npm run test:coverage
          
      - name: Remove coverage HTML reports
        run: |
          rm -rf server/coverage/lcov-report
          rm -rf client/coverage/lcov-report

      - name: SonarCloud Scan
        # continue-on-error: true means existing issues won't BLOCK the pipeline.
        # Sonar still runs and reports — you can review issues on SonarCloud UI
        # without the push being blocked. Remove this line once tech debt is cleared.
        continue-on-error: true
        uses: SonarSource/sonarcloud-github-action@ba3875ecf642b2129de2b589510c81a8b53dbf4e # master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Verify Backend Server Build
        run: docker build -t campus-server:test ./server

      - name: Verify Frontend Client Build
        run: docker build -t campus-client:test ./client


