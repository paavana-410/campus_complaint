name: Campus Complaint CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud needs full history

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies and Run Server Tests
        run: |
          cd server
          npm install --legacy-peer-deps
          npm run test:coverage

      - name: Install dependencies and Run Client Tests
        run: |
          cd client
          npm install --legacy-peer-deps
          npm run test:coverage
          
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Verify Backend Server Build
        run: docker build -t campus-server:test ./server

      - name: Verify Frontend Client Build
        run: docker build -t campus-client:test ./client

      - name: Log in to Docker Hub
        # Only run on main branch
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Server Image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v4
        with:
          context: ./server
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/campus-server:latest,${{ secrets.DOCKER_USERNAME }}/campus-server:${{ github.sha }}

      - name: Build and Push Client Image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v4
        with:
          context: ./client
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/campus-client:latest,${{ secrets.DOCKER_USERNAME }}/campus-client:${{ github.sha }}
